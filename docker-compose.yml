services:
  nginx:
    image: nginx:1.30.2-alpine
    volumes:
      - ./:/var/www:rw,delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/log:/var/log/nginx
    ports:
      - "8080:80"
      - "80:80"
    depends_on:
      - php
    networks:
      - api-net

  php:
    build:
      dockerfile: docker/php/php.dockerfile
      args:
        USER_UID: "${USER_UID:-10001}"
        USER_GID: "${USER_GID:-10001}"
      target: dev
    volumes:
      - ./:/var/www:rw,delegated
    working_dir: /var/www
    expose:
      - "9000"
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - api-net

  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: api
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - api-net

  redis:
    image: redis:8.6.4-alpine
    command: redis-server
    ports:
      - "6379:6379"
    environment:
      - REDIS_REPLICATION_MODE=master
    volumes:
      - redis-data:/data:rw
    networks:
      - api-net

  kafka:
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "3"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - api-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - api-net

  supervisor:
    build:
      dockerfile: docker/supervisor/supervisor.dockerfile
    volumes:
      - ./:/var/www:rw,delegated
      - ./docker/supervisor/log:/var/log/supervisor
    working_dir: /var/www
    depends_on:
      - php
      - kafka
      - redis
    restart: unless-stopped
    networks:
      - api-net

volumes:
  postgres-data:
  kafka-data:
  redis-data:

networks:
  api-net:
    driver: bridge
